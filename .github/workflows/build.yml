name: Build patched Dokploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout this repo (patches)
        uses: actions/checkout@v4
        with:
          path: patches

      - name: Clone upstream Dokploy (canary)
        run: git clone --depth=1 --branch canary https://github.com/Dokploy/dokploy.git dokploy

      - name: Apply patches
        run: |
          cd dokploy
          patch -p1 < ../patches/patch/server.ts.patch
          patch -p1 < ../patches/patch/monitoring.patch
          patch -p1 < ../patches/patch/show-servers.patch
          patch -p1 < ../patches/patch/server-setup.patch

      - name: Create .env.production
        run: |
          echo "PORT=3000" > dokploy/.env.production
          echo "NODE_ENV=production" >> dokploy/.env.production

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU (for cross-platform build)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./dokploy
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/johanwidding/dokploy:latest
            ghcr.io/johanwidding/dokploy:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
